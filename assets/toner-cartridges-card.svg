<svg viewBox="0 0 400 200" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Toner and cartridges illustration">
  <defs>
    <linearGradient id="g-printbg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#eef2ff" />
      <stop offset="100%" stop-color="#dbeafe" />
    </linearGradient>
    <linearGradient id="g-pbody" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#334155" />
      <stop offset="100%" stop-color="#0f172a" />
    </linearGradient>
    <linearGradient id="g-ptop" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#475569" />
      <stop offset="100%" stop-color="#1e293b" />
    </linearGradient>
    <linearGradient id="g-ck" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#374151" />
      <stop offset="100%" stop-color="#111827" />
    </linearGradient>
    <linearGradient id="g-cc" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#06b6d4" />
      <stop offset="100%" stop-color="#0e7490" />
    </linearGradient>
    <linearGradient id="g-cm" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ec4899" />
      <stop offset="100%" stop-color="#be185d" />
    </linearGradient>
    <linearGradient id="g-cy" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#facc15" />
      <stop offset="100%" stop-color="#ca8a04" />
    </linearGradient>
    <filter id="f-big" x="-20%" y="-20%" width="140%" height="160%">
      <feDropShadow dx="0" dy="2" stdDeviation="2.2" flood-color="#0f172a" flood-opacity="0.22" />
    </filter>
    <filter id="f-sm" x="-20%" y="-20%" width="140%" height="160%">
      <feDropShadow dx="0" dy="1" stdDeviation="1.2" flood-color="#0f172a" flood-opacity="0.18" />
    </filter>
  </defs>

  <rect width="400" height="200" fill="url(#g-printbg)" />
  <ellipse cx="200" cy="110" rx="160" ry="80" fill="#2563eb" opacity="0.04" />

  <g filter="url(#f-big)">
    <rect x="55" y="88" width="220" height="88" rx="10" fill="url(#g-pbody)" />
    <rect x="55" y="88" width="220" height="28" rx="10" fill="url(#g-ptop)" />
    <rect x="72" y="95" width="168" height="16" rx="5" fill="#1e293b" />
    <rect x="92" y="62" width="130" height="32" rx="2" fill="white" />
    <rect x="95" y="58" width="124" height="32" rx="2" fill="#f8fafc" />
    <rect x="104" y="64" width="75" height="2" rx="1" fill="#d1d5db" />
    <rect x="104" y="70" width="90" height="2" rx="1" fill="#d1d5db" />
    <rect x="104" y="76" width="65" height="2" rx="1" fill="#d1d5db" />
    <circle cx="102" cy="116" r="18" fill="#2563eb" opacity="0.25" />
    <text x="102" y="121" font-size="14" fill="white" text-anchor="middle" font-family="sans-serif" font-weight="bold">HP</text>
    <circle cx="218" cy="108" r="6" fill="#22c55e" />
    <circle cx="218" cy="108" r="3.5" fill="#16a34a" />
    <circle cx="236" cy="108" r="4.5" fill="#f59e0b" />
    <circle cx="252" cy="108" r="4.5" fill="#3b82f6" />
    <rect x="205" y="120" width="52" height="28" rx="4" fill="#1e40af" opacity="0.5" />
    <text x="231" y="137" font-size="7" fill="#93c5fd" text-anchor="middle" font-family="monospace">READY</text>
    <rect x="72" y="170" width="192" height="10" rx="4" fill="#475569" />
  </g>

  <g filter="url(#f-big)">
    <rect x="296" y="62" width="32" height="100" rx="5" fill="url(#g-ck)" />
    <rect x="298" y="64" width="28" height="32" rx="3" fill="#1f2937" />
    <rect x="304" y="72" width="16" height="12" rx="2" fill="#0f172a" />
    <text x="312" y="116" font-size="7" fill="#9ca3af" text-anchor="middle" font-family="sans-serif" font-weight="bold">BLACK</text>
  </g>

  <g filter="url(#f-sm)">
    <rect x="302" y="42" width="24" height="72" rx="4" fill="url(#g-cc)" />
    <text x="314" y="98" font-size="6" fill="white" text-anchor="middle" font-family="sans-serif">CYAN</text>
  </g>

  <g filter="url(#f-sm)">
    <rect x="330" y="42" width="24" height="72" rx="4" fill="url(#g-cm)" />
    <text x="342" y="98" font-size="6" fill="white" text-anchor="middle" font-family="sans-serif">MAG</text>
  </g>

  <g filter="url(#f-sm)">
    <rect x="358" y="55" width="24" height="58" rx="4" fill="url(#g-cy)" />
    <text x="370" y="98" font-size="6" fill="white" text-anchor="middle" font-family="sans-serif">YEL</text>
  </g>

  <text x="200" y="190" font-size="9" fill="#475569" text-anchor="middle" font-family="sans-serif">HP · Canon · Epson · Brother</text>
</svg>
